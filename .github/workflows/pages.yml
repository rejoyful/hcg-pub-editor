name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # GitHub Pages 가 활성화된 저장소에서만 실행. 미러 저장소(Inpsyt/HCG_book_editor
    # 등) 에서는 Pages 미설정으로 configure-pages 단계가 실패하므로 skip.
    # Pages 를 켠 저장소가 추가되면 OR 조건으로 확장.
    if: github.repository == 'rejoyful/hcg-pub-editor'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
