<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCG typesetting editor</title>
<meta name="description" content="HCG typesetting editor — 웹 기반 자동 조판 에디터. HWPX·DOCX·PPTX·HTML·MD·TXT·IDML 자동 파싱.">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<style>
/* ============================================================
   Design tokens
   ============================================================ */
:root{
  --bg:#F5F5F2;
  --panel:#FFFFFF;
  --ink:#1A1A1A;
  --mute:#6A6A68;
  --meta:#8A8A86;
  --line:#E6E4DE;
  --soft:#F0EEE7;
  --accent:#2E6B52;
  --accent-soft:#E8F1EC;
  --warn:#8B1E1E;
  --warn-soft:#FBECEC;
  --ok:#1F7A3E;
  --shadow:0 2px 12px rgba(0,0,0,.06);
  --page-shadow:0 4px 22px rgba(0,0,0,.14);
  --radius:6px;

  /* paper (B5 default = 182mm × 257mm) */
  --page-w: 182mm;
  --page-h: 257mm;
  --page-mt: 22mm;
  --page-mr: 20mm;
  --page-mb: 22mm;
  --page-ml: 20mm;

  /* typography */
  --body-family: "Noto Serif KR","Source Han Serif K","Nanum Myeongjo","Batang",serif;
  --ui-family: "Noto Sans KR","SF Pro Text","Helvetica Neue","Segoe UI",sans-serif;
  --body-size: 10pt;
  --body-leading: 1.75;
  --columns: 1;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--ui-family);font-size:14px;-webkit-text-size-adjust:100%}
button{font-family:inherit}
input,select{font-family:inherit;font-size:13px}

/* ============================================================
   App layout
   ============================================================ */
.app{display:grid;grid-template-rows:52px 1fr 28px;min-height:100vh}

/* Top bar */
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:0 18px;background:var(--panel);border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:60;
}
.brand{font-weight:700;letter-spacing:-.2px;font-size:15px;display:flex;align-items:center;gap:6px}
.brand small{color:var(--meta);font-weight:400;font-size:12px;margin-left:4px}
.topbar .grow{flex:1}
.topbar .doc-title{
  border:1px solid transparent;background:transparent;color:var(--ink);
  padding:6px 10px;border-radius:var(--radius);font-size:13px;width:260px;
  transition:all .15s;
}
.topbar .doc-title:hover{border-color:var(--line)}
.topbar .doc-title:focus{outline:none;border-color:var(--accent);background:#fff}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 13px;border:1px solid var(--line);background:#fff;
  color:var(--ink);border-radius:var(--radius);cursor:pointer;
  font-size:13px;transition:all .12s;white-space:nowrap;
}
.btn:hover{border-color:var(--ink);background:var(--soft)}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.primary:hover{background:#333}
.btn.accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.accent:hover{background:#245944}
.btn:disabled{opacity:.4;cursor:not-allowed}

.menu-wrap{position:relative}
.menu{
  position:absolute;top:calc(100% + 4px);right:0;min-width:220px;
  background:#fff;border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:0 12px 32px rgba(0,0,0,.18);padding:4px;display:none;z-index:200;
}
.menu.show{display:block}
.menu button{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:8px 10px;background:transparent;border:0;text-align:left;
  color:var(--ink);font-size:13px;cursor:pointer;border-radius:4px;
}
.menu button:hover{background:var(--soft)}
.menu button small{color:var(--meta);font-size:11px;margin-left:auto}

/* Main layout */
.main{display:grid;grid-template-columns:280px 1fr;overflow:hidden}

/* ============================================================
   Sidebar
   ============================================================ */
.side{
  background:var(--panel);border-right:1px solid var(--line);
  overflow-y:auto;padding:14px 16px 40px;
}
.side h3{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--mute);margin:18px 0 8px;
}
.side h3:first-child{margin-top:0}
.side .row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.side label{font-size:12px;color:var(--ink);min-width:78px;flex-shrink:0}
.side input[type=text],
.side input[type=number],
.side select{
  padding:5px 8px;border:1px solid var(--line);border-radius:4px;background:#fff;
  width:100%;font-size:12px;color:var(--ink);
}
.side input:focus,.side select:focus{outline:none;border-color:var(--accent)}
.side .seg{display:flex;gap:0;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%}
.side .seg button{
  flex:1;padding:6px 8px;background:#fff;border:0;border-right:1px solid var(--line);
  color:var(--ink);font-size:11px;cursor:pointer;
}
.side .seg button:last-child{border-right:0}
.side .seg button.active{background:var(--ink);color:#fff}

.upload-zone{
  border:2px dashed var(--line);border-radius:var(--radius);
  padding:16px 12px;text-align:center;background:#fafaf7;
  cursor:pointer;transition:all .15s;margin-bottom:10px;
}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-soft)}
.upload-zone .big{display:block;font-size:22px;margin-bottom:4px}
.upload-zone .t{font-size:12px;color:var(--ink);font-weight:600}
.upload-zone .s{font-size:10.5px;color:var(--meta);margin-top:3px;line-height:1.5}

.pipeline{
  display:flex;flex-direction:column;gap:2px;margin-top:6px;
}
.pipeline .step{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--meta);padding:3px 6px;border-radius:3px;
}
.pipeline .step.done{color:var(--ok)}
.pipeline .step.active{color:var(--accent);background:var(--accent-soft);font-weight:600}
.pipeline .step .ic{width:14px;text-align:center;font-weight:700}

/* ============================================================
   Editor area = the book itself
   ============================================================ */
.stage{
  overflow-y:auto;overflow-x:auto;
  background:var(--bg);padding:0 32px 80px;
  position:relative;
}
.stage.drop-active::after{
  content:"파일을 놓으면 자동으로 파싱됩니다 — HWPX · DOCX · PPTX · HTML · MD · TXT · IDML";
  position:fixed;inset:52px 0 28px 280px;z-index:40;
  display:grid;place-items:center;
  background:rgba(26,26,26,.82);color:#fff;font-size:15px;
  border:3px dashed #fff;pointer-events:none;
}

/* Book container — vertical stack of spreads */
.book{
  display:flex;flex-direction:column;align-items:center;gap:28px;
  padding:32px 0 60px;min-width:max-content;
}

/* Spread = a pair of facing pages (좌·우 페이지) */
.spread{
  display:grid;
  grid-template-columns:var(--page-w) var(--page-w);
  background:#fff;
  box-shadow:var(--page-shadow);
  position:relative;
}
/* Centerline between left and right page */
.spread::before{
  content:"";position:absolute;top:0;bottom:0;left:50%;width:1px;
  background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.10) 6%, rgba(0,0,0,.10) 94%, rgba(0,0,0,0) 100%);
  pointer-events:none;z-index:2;
}
/* Subtle inner gutter shadow on each page edge near the spine */
.spread::after{
  content:"";position:absolute;top:0;bottom:0;left:50%;width:24px;
  transform:translateX(-50%);
  background:radial-gradient(ellipse at center, rgba(0,0,0,.05), rgba(0,0,0,0) 70%);
  pointer-events:none;z-index:1;
}

/* Single page card */
.page{
  width:var(--page-w);
  height:var(--page-h);
  background:#fff;
  position:relative;
  overflow:hidden;
}
.page.live{
  /* live page hosts the actual #editor; its scroll is internal */
  height:var(--page-h);
}
.page-head,.page-foot{
  position:absolute;left:0;right:0;
  font-size:9pt;color:var(--meta);
  font-family:var(--ui-family);
  padding:0 var(--page-mr) 0 var(--page-ml);
  display:flex;align-items:center;justify-content:space-between;
  pointer-events:none;z-index:3;
}
.page-head{top:calc(var(--page-mt) * 0.35);height:12pt}
.page-foot{bottom:calc(var(--page-mb) * 0.35);height:12pt}
.page-head.left,.page-foot.left{justify-content:flex-start}
.page-head.center,.page-foot.center{justify-content:center}
.page-head.right,.page-foot.right{justify-content:flex-end}
.page-head.outer,.page-foot.outer{justify-content:flex-end}
.page-left .page-head.outer,.page-left .page-foot.outer{justify-content:flex-start}
.page-right .page-head.outer,.page-right .page-foot.outer{justify-content:flex-end}

/* Page inner = padded margin box */
.page-inner{
  padding:var(--page-mt) var(--page-mr) var(--page-mb) var(--page-ml);
  height:100%;
  position:relative;
  font-family:var(--body-family);
  font-size:var(--body-size);
  line-height:var(--body-leading);
  color:var(--ink);
}

/* Page clip = the cell where editor or mirror lives, clipped to page-inner box */
.page-clip{
  position:relative;
  height:calc(var(--page-h) - var(--page-mt) - var(--page-mb));
  overflow:hidden;
  column-count:var(--columns);
  column-gap:8mm;
}
.page.live .page-clip{
  /* Active editing window — internal scroll inside page bounds */
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;scrollbar-color:var(--line) transparent;
}
.page.live .page-clip::-webkit-scrollbar{width:6px}
.page.live .page-clip::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
.page.live .page-clip::-webkit-scrollbar-track{background:transparent}

/* Subtle highlight on the active edit page */
.page.live::after{
  content:"";position:absolute;inset:0;
  border:1px solid var(--accent-soft);pointer-events:none;
  box-shadow:inset 0 0 0 1px rgba(46,107,82,.12);
}

/* Mirror = read-only print preview of the editor's content (offset slice) */
.mirror{
  position:relative;
  pointer-events:none;
  user-select:none;
}
.mirror .ProseMirror{
  cursor:default;
}
.mirror::after{
  /* tiny "page X 미리보기" label at top-right of mirror */
  content:attr(data-label);
  position:absolute;top:-18px;right:0;
  font-size:9px;color:var(--meta);font-family:var(--ui-family);
  letter-spacing:.4px;text-transform:uppercase;opacity:.7;
}

/* ProseMirror / Tiptap content styles */
.ProseMirror{outline:none;min-height:calc(var(--page-h) - var(--page-mt) - var(--page-mb))}
.ProseMirror:focus{outline:none}
.ProseMirror > *:first-child{margin-top:0}
.ProseMirror h1{font-size:22pt;font-weight:700;margin:0 0 12pt;line-height:1.3;letter-spacing:-.3px}
.ProseMirror h2{font-size:16pt;font-weight:700;margin:18pt 0 8pt;line-height:1.4}
.ProseMirror h3{font-size:13pt;font-weight:700;margin:14pt 0 6pt;line-height:1.4}
.ProseMirror p{margin:0 0 8pt;text-align:justify;word-break:keep-all;overflow-wrap:break-word;text-indent:1em}
.ProseMirror h1+p,.ProseMirror h2+p,.ProseMirror h3+p{text-indent:0}
.ProseMirror ul,.ProseMirror ol{margin:0 0 10pt;padding-left:18pt}
.ProseMirror li{margin-bottom:3pt}
.ProseMirror li > p{text-indent:0;margin:0}
.ProseMirror blockquote{
  border-left:3px solid var(--line);padding:2pt 12pt;margin:10pt 0;
  color:var(--mute);font-style:italic;
}
.ProseMirror code{
  background:var(--soft);padding:1pt 4pt;border-radius:2pt;
  font-family:"JetBrains Mono",Menlo,Consolas,monospace;font-size:.9em;
}
.ProseMirror pre{
  background:#1A1A1A;color:#F5F5F2;padding:10pt;border-radius:4pt;
  overflow-x:auto;margin:10pt 0;font-size:.85em;
}
.ProseMirror pre code{background:transparent;color:inherit;padding:0}
.ProseMirror img{
  max-width:100%;height:auto;border-radius:2pt;vertical-align:middle;
  cursor:pointer;
}
.ProseMirror img.float-left{float:left;margin:0 12pt 6pt 0;max-width:50%;shape-outside:margin-box;shape-margin:6px}
.ProseMirror img.float-right{float:right;margin:0 0 6pt 12pt;max-width:50%;shape-outside:margin-box;shape-margin:6px}
.ProseMirror img.center{display:block;margin:10pt auto}
.ProseMirror img.selected{outline:2px solid var(--accent)}
.ProseMirror img.shape-loading{outline:1px dashed var(--mute)}
.ProseMirror img[data-shape="polygon"]{/* computed polygon applied inline via style.shapeOutside */}

.ProseMirror table{
  border-collapse:collapse;width:100%;margin:10pt 0;table-layout:fixed;
}
.ProseMirror td,.ProseMirror th{
  border:1px solid var(--ink);padding:4pt 6pt;vertical-align:top;
  min-width:40pt;font-size:inherit;
}
.ProseMirror th{background:var(--soft);font-weight:700;text-align:center}

/* Selection */
.ProseMirror ::selection{background:rgba(46,107,82,.25)}

/* ============================================================
   Toolbar (floating, contextual)
   ============================================================ */
.toolbar{
  display:flex;gap:2px;padding:8px 10px;
  background:var(--panel);
  overflow-x:auto;scrollbar-width:thin;
}
.toolbar .grp{display:flex;gap:1px;padding-right:8px;margin-right:4px;border-right:1px solid var(--line)}
.toolbar .grp:last-child{border-right:0}
.toolbar button{
  min-width:30px;height:28px;padding:0 6px;background:transparent;
  border:1px solid transparent;border-radius:4px;color:var(--ink);
  font-size:12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
}
.toolbar button:hover{background:var(--soft);border-color:var(--line)}
.toolbar button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.toolbar button .ph,.toolbar button .ph-bold{font-size:17px;line-height:1;display:inline-block}
.toolbar button span.tag{font-size:11px;font-weight:700;letter-spacing:.2px}

.sub-top{
  position:sticky;top:0;z-index:30;
  display:flex;
  background:var(--panel);
  border-bottom:1px solid var(--line);
  box-shadow:0 2px 10px rgba(0,0,0,.04);
  backdrop-filter:saturate(1.2);
}
.sub-top .toolbar{flex:1;border-bottom:0}

/* ============================================================
   Status bar
   ============================================================ */
.statusbar{
  background:var(--ink);color:#E8E8E3;
  display:flex;align-items:center;gap:14px;padding:0 14px;
  font-size:11px;letter-spacing:.2px;
}
.statusbar .dot{width:6px;height:6px;border-radius:50%;background:var(--ok);display:inline-block}
.statusbar .grow{flex:1}
.statusbar b{color:#fff;font-weight:600}

/* Toast */
.toast{
  position:fixed;bottom:42px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:9px 16px;border-radius:20px;
  font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.25);
  opacity:0;pointer-events:none;transition:all .25s;z-index:100;
  max-width:80vw;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--ok)}
.toast.err{background:var(--warn)}
.toast.info{background:var(--accent)}

/* Loading overlay */
.loader{
  position:fixed;inset:0;background:rgba(245,245,242,.9);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;
  z-index:200;
}
.loader.show{display:flex}
.loader .spin{
  width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--accent);
  border-radius:50%;animation:spin 1s linear infinite;
}
.loader .msg{font-size:13px;color:var(--ink);font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}

/* Image modal */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  display:none;align-items:center;justify-content:center;z-index:150;
}
.modal.show{display:flex}
.modal .card{
  background:#fff;border-radius:8px;padding:22px;max-width:420px;width:90vw;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.modal h4{margin:0 0 14px;font-size:14px}
.modal .img-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.modal .opt{
  border:2px solid var(--line);border-radius:6px;padding:18px 8px;
  text-align:center;cursor:pointer;font-size:11px;color:var(--ink);
  transition:all .12s;user-select:none;
}
.modal .opt:hover{border-color:var(--accent)}
.modal .opt.sel{border-color:var(--accent);background:var(--accent-soft)}
.modal .opt .demo{font-size:24px;display:block;margin-bottom:4px}
.modal .foot{display:flex;justify-content:flex-end;gap:8px}

/* ============================================================
   Print / PDF export
   ============================================================ */
@media print{
  @page{
    size:var(--page-w) var(--page-h);
    margin:var(--page-mt) var(--page-mr) var(--page-mb) var(--page-ml);
  }
  body{background:#fff}
  .topbar,.side,.sub-top,.statusbar,.toast,.loader,.modal{display:none !important}
  .main{grid-template-columns:1fr}
  .stage{padding:0;overflow:visible;background:#fff}
  .book{gap:0;padding:0;min-width:0}
  .spread{display:block;box-shadow:none;background:transparent}
  .spread::before,.spread::after{display:none}
  .mirror::after{display:none}
  .page{
    width:auto;height:auto;box-shadow:none;
    page-break-after:always;overflow:visible;
  }
  .page::after{display:none}
  .page:last-child{page-break-after:auto}
  .page.live{display:block}
  .page:not(.live){display:none}  /* print only the live editor content (the single source) */
  .page-head,.page-foot{display:none}
  .page-inner{
    padding:0;height:auto;
    font-family:var(--body-family);
    font-size:var(--body-size);
    line-height:var(--body-leading);
  }
  .page-clip{height:auto;overflow:visible;column-count:var(--columns)}
  .ProseMirror{min-height:auto}
}
</style>
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="brand">HCG typesetting editor</div>
    <input type="text" class="doc-title" id="doc-title" placeholder="원고 제목 (도곽 머리말에 표시)" value="원고 제목">
    <div class="grow"></div>
    <button class="btn" id="btn-new" title="새 문서">새 문서</button>
    <div class="menu-wrap">
      <button class="btn primary" id="btn-export">내보내기 ▾</button>
      <div class="menu" id="menu-export">
        <button data-kind="pdf">PDF · 인쇄 <small>⌘P</small></button>
        <button data-kind="docx">Word (.docx)</button>
        <button data-kind="html">HTML</button>
        <button data-kind="md">Markdown</button>
        <button data-kind="json">JSON</button>
        <button data-kind="txt">텍스트</button>
      </div>
    </div>
  </header>

  <div class="main">

    <aside class="side">
      <h3>원고 가져오기</h3>
      <div class="upload-zone" id="upload-zone">
        <span class="big">⤓</span>
        <div class="t">파일 업로드 / 드롭</div>
        <div class="s">HWPX · DOCX · PPTX · HTML · MD · TXT · IDML</div>
        <div class="s" style="margin-top:8px;color:var(--warn);font-size:10.5px;line-height:1.45">
          ※ <b>HWP (바이너리)는 지원되지 않습니다</b><br>
          한글 → <i>다른 이름으로 저장</i> → <b>.hwpx</b>로 저장 후 업로드하세요.
        </div>
      </div>
      <input type="file" id="file-input" accept=".hwpx,.hwp,.docx,.pptx,.html,.htm,.md,.markdown,.txt,.idml,.indd,.xml,.zip" style="display:none" multiple>
      <button class="btn" style="width:100%;margin-top:4px" id="btn-sample">샘플 원고 불러오기</button>
      <div class="pipeline" id="pipeline" style="display:none">
        <div class="step" data-step="unpack"><span class="ic">①</span><span>포맷 인식</span></div>
        <div class="step" data-step="parse"><span class="ic">②</span><span>문서 파싱</span></div>
        <div class="step" data-step="images"><span class="ic">③</span><span>이미지 추출·배치</span></div>
        <div class="step" data-step="style"><span class="ic">④</span><span>스타일 정규화</span></div>
        <div class="step" data-step="editor"><span class="ic">⑤</span><span>에디터 적용</span></div>
      </div>

      <h3>용지 · 여백</h3>
      <div class="row">
        <label>용지</label>
        <select id="sel-paper">
          <option value="B5" selected>B5 (182×257)</option>
          <option value="A4">A4 (210×297)</option>
          <option value="A5">A5 (148×210)</option>
          <option value="Shinkook">신국판 (152×225)</option>
          <option value="46">46판 (127×188)</option>
        </select>
      </div>
      <div class="row">
        <label>단</label>
        <div class="seg" id="seg-columns">
          <button data-val="1" class="active">1단</button>
          <button data-val="2">2단</button>
        </div>
      </div>
      <div class="row">

/* ============================================================
   Parsers
   ============================================================ */

function parseHwpxXmlToHtml(xmlText){
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, 'application/xml');
  const perr = xml.querySelector('parsererror');
  if (perr) throw new Error('HWPX XML 파싱 실패');
  const paras = xml.querySelectorAll('p, hp\\:p');
  const out = [];
  paras.forEach(p=>{
    const runs = p.querySelectorAll('t, hp\\:t');
    let text = '';
    runs.forEach(t=>{ text += (t.textContent || ''); });
    text = text.trim();
    if (!text) return;
    const isHeading = /^(\d+(\.\d+)*\.?\s+)/.test(text) && text.length < 80;
    if (isHeading){ out.push(`<h2>${escapeHtml(text)}</h2>`); return; }
    const isTitleMaybe = out.length === 0 && text.length < 40;
    if (isTitleMaybe){ out.push(`<h1>${escapeHtml(text)}</h1>`); return; }
    out.push(`<p>${escapeHtml(text)}</p>`);
  });
  return out.join('\n');
}

async function parseHwpxFile(file){
  const zip = await JSZip.loadAsync(file);
  const sections = [];
  zip.forEach((path)=>{
    if (/Contents\/section\d+\.xml$/i.test(path)) sections.push(path);
  });
  sections.sort();
  if (!sections.length) throw new Error('HWPX 내부에서 섹션을 찾지 못했습니다');
  let combined = '';
  for (const p of sections){
    const xml = await zip.file(p).async('string');
    combined += parseHwpxXmlToHtml(xml) + '\n';
  }
  const images = {};
  const imgEntries = [];
  zip.forEach((path, entry)=>{
    if (/BinData\/[^/]+\.(png|jpe?g|gif|bmp)$/i.test(path)) imgEntries.push({path, entry});
  });
  for (const {path, entry} of imgEntries){
    const b64 = await entry.async('base64');
    const ext = path.split('.').pop().toLowerCase();
    const mime = ext==='jpg'?'image/jpeg':`image/${ext}`;
    images[path] = `data:${mime};base64,${b64}`;
  }
  const imgHtml = Object.values(images).map(src=>
    `<p><img src="${src}" class="center" alt=""></p>`
  ).join('');
  return combined + imgHtml;
}

async function parseDocxFile(file){
  const m = await loadMammoth();
  const ab = await file.arrayBuffer();
  const result = await m.convertToHtml({ arrayBuffer: ab }, {
    styleMap: [
      "p[style-name='Heading 1'] => h1:fresh",
      "p[style-name='Heading 2'] => h2:fresh",
      "p[style-name='Heading 3'] => h3:fresh",
      "p[style-name='제목 1'] => h1:fresh",
      "p[style-name='제목 2'] => h2:fresh",
      "p[style-name='Quote'] => blockquote:fresh",
    ]
  });
  return result.value || '';
}

async function parsePptxFile(file){
  const zip = await JSZip.loadAsync(file);
  const slidePaths = [];
  zip.forEach((path)=>{
    if (/^ppt\/slides\/slide\d+\.xml$/i.test(path)) slidePaths.push(path);
  });
  slidePaths.sort((a,b)=>{
    const na = parseInt(a.match(/slide(\d+)/)[1], 10);
    const nb = parseInt(b.match(/slide(\d+)/)[1], 10);
    return na - nb;
  });
  if (!slidePaths.length) throw new Error('PPTX 내부에 슬라이드가 없습니다');

  const images = {};
  for (const p of Object.keys(zip.files)){
    if (/^ppt\/media\/.+\.(png|jpe?g|gif|bmp)$/i.test(p)){
      const b64 = await zip.file(p).async('base64');
      const ext = p.split('.').pop().toLowerCase();
      const mime = ext==='jpg'?'image/jpeg':`image/${ext}`;
      images[p.split('/').pop()] = `data:${mime};base64,${b64}`;
    }
  }

  const parts = [];
  const parser = new DOMParser();
  for (let i=0; i<slidePaths.length; i++){
    const path = slidePaths[i];
    const xmlText = await zip.file(path).async('string');
    const xml = parser.parseFromString(xmlText, 'application/xml');
    const texts = Array.from(xml.getElementsByTagName('a:t'))
      .map(el=>el.textContent.trim()).filter(Boolean);
    parts.push(`<h2>슬라이드 ${i+1}</h2>`);
    if (texts.length){
      parts.push(`<h3>${escapeHtml(texts[0])}</h3>`);
      for (let j=1; j<texts.length; j++) parts.push(`<p>${escapeHtml(texts[j])}</p>`);
    }
  }
  if (Object.keys(images).length){
    parts.push('<h2>첨부 이미지</h2>');
    Object.values(images).forEach(src=>{
      parts.push(`<p><img src="${src}" class="center" alt=""></p>`);
    });
  }
  return parts.join('\n');
}

async function parseIdmlFile(file){
  const zip = await JSZip.loadAsync(file);
  const storyPaths = [];
  zip.forEach((path)=>{
    if (/^Stories\/Story_.+\.xml$/i.test(path)) storyPaths.push(path);
  });
  if (!storyPaths.length) throw new Error('IDML에서 Stories를 찾지 못했습니다');
  storyPaths.sort();
  const parser = new DOMParser();
  const parts = [];
  for (const p of storyPaths){
    const xmlText = await zip.file(p).async('string');
    const xml = parser.parseFromString(xmlText, 'application/xml');
    const psrs = xml.getElementsByTagName('ParagraphStyleRange');
    for (const psr of psrs){
      const style = (psr.getAttribute('AppliedParagraphStyle')||'').toLowerCase();
      const contents = psr.getElementsByTagName('Content');
      let text = '';
      for (const c of contents) text += c.textContent;
      text = text.trim();
      if (!text) continue;
      if (/heading\s*1|h1|title/.test(style)){ parts.push(`<h1>${escapeHtml(text)}</h1>`); }
      else if (/heading\s*2|h2/.test(style)){ parts.push(`<h2>${escapeHtml(text)}</h2>`); }
      else if (/heading\s*3|h3/.test(style)){ parts.push(`<h3>${escapeHtml(text)}</h3>`); }
      else { parts.push(`<p>${escapeHtml(text)}</p>`); }
    }
  }
  return parts.join('\n');
}

function sanitizeHtml(html){
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  tmp.querySelectorAll('script, style, link, meta').forEach(n=>n.remove());
  tmp.querySelectorAll('[style]').forEach(n=>{
    const s = n.getAttribute('style') || '';
    const align = s.match(/text-align\s*:\s*(left|center|right|justify)/i);
    n.removeAttribute('style');
    if (align) n.style.textAlign = align[1];
  });
  tmp.querySelectorAll('[class]').forEach(n=>{
    if (n.tagName !== 'IMG') n.removeAttribute('class');
  });
  const body = tmp.querySelector('body');
  if (body) return body.innerHTML;
  return tmp.innerHTML;
}

async function parseMarkdown(md){
  const marked = await loadMarked();
  if (typeof marked === 'function') return marked(md);
  if (marked && marked.parse) return marked.parse(md);
  return md;
}

function parseTxt(text){
  const blocks = text.split(/\n\s*\n/);
  return blocks.map(b=>{
    const t = b.trim();
    if (!t) return '';
    if (t.length < 50 && /^[#]|^\d+\.\s|^제\d+[장절]|^[A-Z\uAC00-\uD7A3][^.!?]*$/.test(t)){
      return `<h2>${escapeHtml(t)}</h2>`;
    }
    return `<p>${escapeHtml(t)}</p>`;
  }).filter(Boolean).join('\n');
}

function escapeHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ============================================================
   Unified entry
   ============================================================ */
async function handleUploadedFile(file){
  const name = file.name;
  const ext = (name.split('.').pop() || '').toLowerCase();
  setStatus(`처리 중: ${name}`, 'work');
  resetPipeline();

  try{
    stepActive('unpack');
    showLoader(`${name} 처리 중…`);
    await new Promise(r=>setTimeout(r, 60));
    stepDone('unpack');

    stepActive('parse');
    let html = '';
    switch(ext){
      case 'hwpx':
        html = await parseHwpxFile(file); break;
      case 'xml':
        html = parseHwpxXmlToHtml(await file.text()); break;
      case 'docx':
        html = await parseDocxFile(file); break;
      case 'pptx':
        html = await parsePptxFile(file); break;
      case 'html': case 'htm':
        html = sanitizeHtml(await file.text()); break;
      case 'md': case 'markdown':
        html = await parseMarkdown(await file.text()); break;
      case 'txt':
        html = parseTxt(await file.text()); break;
      case 'idml':
        html = await parseIdmlFile(file); break;
      case 'hwp':
        throw new Error('HWP(한글 바이너리)는 한컴에서 "다른 이름으로 저장 → .hwpx"로 변환 후 업로드해 주세요');
      case 'indd':
        throw new Error('INDD는 InDesign에서 "파일 → 내보내기 → IDML"로 변환 후 업로드해 주세요');
      case 'zip':
        try { html = await parseHwpxFile(file); }
        catch(_){ html = await parseIdmlFile(file); }
        break;
      default:
        throw new Error(`지원되지 않는 형식: .${ext}`);
    }
    stepDone('parse');

    stepActive('images');
    await new Promise(r=>setTimeout(r, 40));
    stepDone('images');

    stepActive('style');
    if (!html.trim()) throw new Error('문서 내용이 비어있습니다');
    stepDone('style');

    stepActive('editor');
    editor.commands.setContent(html, false);
    setTimeout(()=>{ rescanEditorImages(); scheduleReflow(); }, 50);
    stepDone('editor');
    pipelineHide();
    setStatus(`완료: ${name}`, 'ok');
    toast(`${name} 불러오기 완료`, 'ok');
  }catch(err){
    console.error(err);
    setStatus('오류: ' + err.message, 'err');
    toast(err.message, 'err');
    pipelineHide();
  }finally{
    hideLoader();
  }
}

/* ============================================================
   Tiptap init
   ============================================================ */
function normalizePastedHtml(html){
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  // Kill script/style/link/meta that HWP / Word clipboards often drag in
  tmp.querySelectorAll('script, style, link, meta, xml, o\\:p, w\\:sdt').forEach(n=>n.remove());
  // Unwrap font tags and spans that only carry junk styling
  tmp.querySelectorAll('font').forEach(f=>{
    const frag = document.createDocumentFragment();
    while (f.firstChild) frag.appendChild(f.firstChild);
    f.replaceWith(frag);
  });
  // Strip inline style except text-align, keep the editor's own typography in charge
  tmp.querySelectorAll('[style]').forEach(n=>{
    const s = n.getAttribute('style') || '';
    const ta = s.match(/text-align\s*:\s*(left|center|right|justify)/i);
    n.removeAttribute('style');
    if (ta) n.style.textAlign = ta[1];
  });
  // Drop class names that collide with our own (but keep img float classes)
  tmp.querySelectorAll('[class]').forEach(n=>{
    if (n.tagName === 'IMG'){
      const cls = (n.className || '').split(/\s+/).filter(c=>/^(float-left|float-right|center)$/.test(c));
      if (cls.length) n.className = cls.join(' '); else n.removeAttribute('class');
    } else {
      n.removeAttribute('class');
    }
  });
  // Collapse totally-empty paragraphs that HWP uses for spacing
  tmp.querySelectorAll('p').forEach(p=>{
    if (!p.textContent.trim() && !p.querySelector('img,br,hr,table')) p.remove();
  });
  // Hoist single-child div wrappers up to paragraphs
  tmp.querySelectorAll('div').forEach(d=>{
    if (d.children.length === 0 && d.textContent.trim()){
      const p = document.createElement('p'); p.textContent = d.textContent;
      d.replaceWith(p);
    }
  });
  return tmp.innerHTML;
}

/* ============================================================
   Pagination engine — spread layout + live editor + mirrors
   ============================================================ */
function parseLengthToPx(str){
  if (!str) return 0;
  str = String(str).trim();
  if (str.endsWith('mm')) return parseFloat(str) * 3.7795275591;
  if (str.endsWith('cm')) return parseFloat(str) * 37.795275591;
  if (str.endsWith('in')) return parseFloat(str) * 96;
  if (str.endsWith('pt')) return parseFloat(str) * 1.3333333333;
  if (str.endsWith('px')) return parseFloat(str);
  return parseFloat(str) || 0;
}
function getPageInnerHpx(){
  const ref = document.querySelector('.page:not(.live) .page-clip');
  if (ref){
    const h = ref.getBoundingClientRect().height;
    if (h > 0) return h;
  }
  const cs = getComputedStyle(document.documentElement);
  const totalH = parseLengthToPx(cs.getPropertyValue('--page-h'));
  const mt = parseLengthToPx(cs.getPropertyValue('--page-mt'));
  const mb = parseLengthToPx(cs.getPropertyValue('--page-mb'));
  return Math.max(1, totalH - mt - mb);
}
function getEditorContentHpx(){
  const pm = document.querySelector('#editor .ProseMirror');
  if (!pm) return 0;
  return pm.scrollHeight;
}

let _reflowTimer = null;
function scheduleReflow(){
  if (_reflowTimer) cancelAnimationFrame(_reflowTimer);
  _reflowTimer = requestAnimationFrame(()=>{
    _reflowTimer = requestAnimationFrame(()=>{
      _reflowTimer = null;
      reflow();
    });
  });
}

/** Measure editor content height using its last rendered block's offsetTop+offsetHeight
 *  for a tight bound, then fall back to scrollHeight. */
function measureEditorContentH(){
  const pm = document.querySelector('#editor .ProseMirror');
  if (!pm) return 0;
  // Find last non-empty child block
  const children = pm.children;
  let lastBottom = 0;
  for (let i = children.length - 1; i >= 0; i--){
    const c = children[i];
    const r = c.getBoundingClientRect();
    if (r.height > 0 && (c.textContent.trim().length > 0 || c.querySelector('img,table,hr'))){
      const pmTop = pm.getBoundingClientRect().top;
      lastBottom = (r.bottom - pmTop);
      break;
    }
  }
  // scrollHeight is an over-estimate if the pm has a min-height taller than actual
  // offset-based measurement is tighter
  const scroll = pm.scrollHeight;
  return Math.max(10, lastBottom > 0 ? Math.min(lastBottom + 4, scroll) : scroll);
}

function reflow(){
  const pageInnerH = getPageInnerHpx();
  if (pageInnerH <= 0) return;
  const fullH = measureEditorContentH();
  let pagesNeeded = Math.max(1, Math.ceil(fullH / pageInnerH));
  if (pagesNeeded % 2 === 1) pagesNeeded += 1;  // always fill a full spread
  const spreadsNeeded = Math.max(1, pagesNeeded / 2);
  syncSpreads(spreadsNeeded);
  updateMirrors();
  trimEmptyTrailingSpreads(pageInnerH);
  applyHeaderFooter();
}

/** After content shrinks, drop any trailing spread whose pages show no visible content. */
function trimEmptyTrailingSpreads(pageInnerH){
  const book = $('#book');
  const spreads = Array.from(book.querySelectorAll('.spread'));
  for (let i = spreads.length - 1; i >= 1; i--){   // never drop spread 0
    const sp = spreads[i];
    const leftIdx  = parseInt(sp.querySelector('.page-left')?.dataset.pageIdx  || '0', 10);
    const fullH = measureEditorContentH();
    // A page at index N shows content if fullH > N * pageInnerH
    if (fullH > leftIdx * pageInnerH) break;   // this spread still has content — keep all below
    sp.remove();
  }
}

function syncSpreads(target){
  const book = $('#book');
  const spreads = () => book.querySelectorAll('.spread');
  while (spreads().length < target){
    const i = spreads().length;
    book.appendChild(createExtraSpread(i));
  }
  while (spreads().length > target){
    const last = book.querySelector('.spread:last-child');
    if (!last) break;
    if (last.dataset.spreadIdx === '0') break;   // never delete first spread
    last.remove();
  }
}

function createExtraSpread(spreadIdx){
  const leftIdx  = spreadIdx * 2;
  const rightIdx = spreadIdx * 2 + 1;
  const sp = document.createElement('div');
  sp.className = 'spread';
  sp.dataset.spreadIdx = String(spreadIdx);
  sp.innerHTML = `
    <div class="page page-left" data-page-idx="${leftIdx}">
      <div class="page-head center" data-head></div>
      <div class="page-inner"><div class="page-clip">
        <div class="mirror" data-page-idx="${leftIdx}" data-label="page ${leftIdx+1} preview"></div>
      </div></div>
      <div class="page-foot center" data-foot><span class="pagenum">${leftIdx+1}</span></div>
    </div>
    <div class="page page-right" data-page-idx="${rightIdx}">
      <div class="page-head center" data-head></div>
      <div class="page-inner"><div class="page-clip">
        <div class="mirror" data-page-idx="${rightIdx}" data-label="page ${rightIdx+1} preview"></div>
      </div></div>
      <div class="page-foot center" data-foot><span class="pagenum">${rightIdx+1}</span></div>
    </div>`;
  return sp;
}

function updateMirrors(){
  const pmSrc = document.querySelector('#editor .ProseMirror');
  if (!pmSrc) return;
  const pageInnerH = getPageInnerHpx();
  const srcHTML = pmSrc.innerHTML;
  const pmClassList = pmSrc.className;
  const pmStyle = pmSrc.getAttribute('style') || '';
  document.querySelectorAll('.mirror[data-page-idx]').forEach(m=>{
    const idx = parseInt(m.dataset.pageIdx, 10);
    if (idx === 0) return;
    // Snapshot the live editor's rendered content into a read-only clone,
    // translated so that this page shows the correct slice.
    m.innerHTML = `<div class="${pmClassList}" style="${pmStyle};transform:translateY(${-idx * pageInnerH}px);width:100%;min-height:0;pointer-events:none">${srcHTML}</div>`;
  });
}

/* ============================================================
   Header / Footer / page numbers — adapt to spread DOM
   ============================================================ */
function getStartPage(){ return Math.max(1, parseInt($('#in-start-page').value || '1', 10) || 1); }

function applyHeaderFooter(){
  const title = $('#doc-title').value || '';
  const headPos = $('#sel-head-pos').value;
  const footPos = $('#sel-foot-pos').value;
  const startPage = getStartPage();
  $$('.page').forEach(page=>{
    const idx = parseInt(page.dataset.pageIdx || '0', 10);
    const isRight = page.classList.contains('page-right');
    const logicalPos = pos => pos === 'outer' ? (isRight ? 'right' : 'left') : pos;
    const head = page.querySelector('[data-head]');
    const foot = page.querySelector('[data-foot]');
    if (head){
      if (headPos === 'none'){ head.style.display = 'none'; }
      else {
        head.style.display = 'flex';
        head.className = `page-head ${logicalPos(headPos)}`;
        head.textContent = title;
      }
    }
    if (foot){
      if (footPos === 'none'){ foot.style.display = 'none'; }
      else {
        foot.style.display = 'flex';
        foot.className = `page-foot ${logicalPos(footPos)}`;
        const num = startPage + idx;
        foot.innerHTML = `<span class="pagenum">${num}</span>`;
      }
    }
  });
}

/* ============================================================
   Image insertion + SlickWrap-style polygon shape-outside
   ============================================================ */

/**
 * jQSlickWrap-inspired polygon detection:
 * scan sampled rows of an image's alpha / luminance channel, find the
 * content edge on the side facing the body text, and emit a CSS
 * shape-outside polygon so text wraps tightly against the subject.
 * Works on data-URL / same-origin images. CORS-tainted images fall
 * back to margin-box wrapping.
 */
function applyImageShape(img){
  if (!img || img.tagName !== 'IMG') return;
  const isLeft  = img.classList.contains('float-left');
  const isRight = img.classList.contains('float-right');
  if (!isLeft && !isRight){
    img.style.shapeOutside = '';
    img.style.shapeMargin = '';
    img.removeAttribute('data-shape');
    return;
  }
  if (!img.complete || img.naturalWidth === 0){
    img.classList.add('shape-loading');
    img.addEventListener('load', ()=>{ img.classList.remove('shape-loading'); applyImageShape(img); }, { once: true });
    return;
  }
  img.classList.remove('shape-loading');
  try {
    const w = img.naturalWidth, h = img.naturalHeight;
    const maxDim = 600;  // cap canvas size for performance
    const scale = Math.min(1, maxDim / Math.max(w, h));
    const cw = Math.max(1, Math.round(w * scale));
    const ch = Math.max(1, Math.round(h * scale));
    const canvas = document.createElement('canvas');
    canvas.width = cw; canvas.height = ch;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(img, 0, 0, cw, ch);
    let data;
    try { data = ctx.getImageData(0, 0, cw, ch).data; }
    catch(e){ throw new Error('CORS'); }
    const SAMPLES = 40;
    const step = Math.max(1, Math.floor(ch / SAMPLES));
    const ALPHA_THR = 16;        // ignore fully-transparent
    const LUM_THR   = 242;       // ignore near-white background
    const points = [];
    for (let y = 0; y < ch; y += step){
      let edge = isLeft ? 0 : cw - 1;
      if (isLeft){
        for (let x = cw - 1; x >= 0; x--){
          const i = (y * cw + x) * 4;
          const a = data[i + 3];
          if (a < ALPHA_THR) continue;
          const lum = (data[i] + data[i+1] + data[i+2]) / 3;
          if (lum < LUM_THR){ edge = x; break; }
        }
      } else {
        for (let x = 0; x < cw; x++){
          const i = (y * cw + x) * 4;
          const a = data[i + 3];
          if (a < ALPHA_THR) continue;
          const lum = (data[i] + data[i+1] + data[i+2]) / 3;
          if (lum < LUM_THR){ edge = x; break; }
        }
      }
      points.push({ x: edge, y });
    }
    // Smooth the edge curve (simple 3-tap box filter) — reduces jaggy zig-zag
    const smooth = points.map((p, i)=>{
      const p0 = points[Math.max(0,i-1)], p1 = p, p2 = points[Math.min(points.length-1,i+1)];
      return { x: Math.round((p0.x + p1.x + p2.x) / 3), y: p.y };
    });
    const xPct = px => (px / cw * 100).toFixed(2);
    const yPct = py => (py / ch * 100).toFixed(2);
    const parts = [];
    if (isLeft){
      parts.push('0% 0%');
      smooth.forEach(p => parts.push(`${xPct(p.x)}% ${yPct(p.y)}%`));
      parts.push('0% 100%');
    } else {
      parts.push('100% 0%');
      smooth.forEach(p => parts.push(`${xPct(p.x)}% ${yPct(p.y)}%`));
      parts.push('100% 100%');
    }
    img.style.shapeOutside = `polygon(${parts.join(', ')})`;
    img.style.shapeMargin = '8px';
    img.setAttribute('data-shape', 'polygon');
  } catch(e){
    // CORS-tainted or unsupported — fall back to margin-box
    img.style.shapeOutside = 'margin-box';
    img.style.shapeMargin = '6px';
    img.setAttribute('data-shape', 'fallback');
  }
}

function setImagePosition(img, pos){
  if (!img) return;
  img.classList.remove('float-left','float-right','center');
  img.classList.add(pos);
  applyImageShape(img);
  scheduleReflow();
}

const imgModal = $('#img-modal');
let pendingImageUrl = null;
function triggerImageInsert(){
  const picker = document.createElement('input');
  picker.type = 'file';
  picker.accept = 'image/*';
  picker.onchange = ()=>{
    const f = picker.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      pendingImageUrl = reader.result;
      imgModal.classList.add('show');
    };
    reader.readAsDataURL(f);
  };
  picker.click();
}
$$('#img-opts .opt').forEach(opt=>{
  opt.addEventListener('click', ()=>{
    $$('#img-opts .opt').forEach(o=>o.classList.remove('sel'));
    opt.classList.add('sel');
  });
});
$('#img-cancel').addEventListener('click', ()=>{
  imgModal.classList.remove('show'); pendingImageUrl = null;
});
$('#img-ok').addEventListener('click', ()=>{
  if (!pendingImageUrl){ imgModal.classList.remove('show'); return; }
  const pos = $('#img-opts .opt.sel')?.dataset.pos || 'center';
  editor.chain().focus().setImage({ src: pendingImageUrl, alt: '' }).run();
  setTimeout(()=>{
    $$('#editor img').forEach(img=>{
      if (img.src === pendingImageUrl && !img.dataset.placed){
        setImagePosition(img, pos);
        img.dataset.placed = '1';
      }
    });
    updateStatus(editor);
    scheduleReflow();
  }, 30);
  imgModal.classList.remove('show');
  pendingImageUrl = null;
});

$('#editor').addEventListener('click', e=>{
  const img = e.target.closest('img');
  if (!img) return;
  const current = img.classList.contains('float-left') ? 'float-left'
                : img.classList.contains('float-right') ? 'float-right' : 'center';
  const next = current === 'center' ? 'float-left' : current === 'float-left' ? 'float-right' : 'center';
  setImagePosition(img, next);
  const label = next === 'center' ? '가운데' : next === 'float-left' ? '왼쪽 (SlickWrap 감싸기)' : '오른쪽 (SlickWrap 감싸기)';
  toast(`이미지 배치: ${label}`, 'info');
});

window.addEventListener('dragleave', ()=>{
  dragDepth = Math.max(0, dragDepth - 1);
  if (dragDepth === 0) stage.classList.remove('drop-active');
});
window.addEventListener('drop', async e=>{
  e.preventDefault();
  dragDepth = 0;
  stage.classList.remove('drop-active');
  const files = Array.from(e.dataTransfer?.files || []);
  for (const f of files) await handleUploadedFile(f);
});

function safeFilename(){
  const title = ($('#doc-title').value || 'hcg-pub-document').trim();
  return title.replace(/[^\p{L}\p{N}_\-가-힣]+/gu, '_').slice(0,60) || 'document';
}

function download(filename, data, mime){
  try{
    const blob = data instanceof Blob ? data : new Blob([data], { type: mime || 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.rel = 'noopener';
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1500);
    toast(`다운로드: ${filename}`, 'ok');
  }catch(err){
    console.error(err);
    toast('다운로드 실패', 'err');
  }
}

async function runExport(kind){
  try{
    const base = safeFilename();
    if (kind === 'pdf'){
      toast('PDF 인쇄 창을 엽니다', 'info');
      setTimeout(()=>window.print(), 180);
      return;
    }
    if (kind === 'html'){
      download(`${base}.html`, buildStandaloneHtml(), 'text/html');
      return;
    }
    if (kind === 'md'){
      download(`${base}.md`, tiptapJsonToMarkdown(editor.getJSON()), 'text/markdown');
      return;
    }
    if (kind === 'json'){
      download(`${base}.json`, JSON.stringify(editor.getJSON(), null, 2), 'application/json');
      return;
    }
    if (kind === 'txt'){
      download(`${base}.txt`, editor.getText(), 'text/plain');
      return;
    }
    if (kind === 'docx'){
      showLoader('DOCX 생성 중…');
      const docx = await loadDocxWriter();
      const blob = await tiptapJsonToDocx(editor.getJSON(), docx);
      hideLoader();
      download(`${base}.docx`, blob, 'application/vnd.openxmlformats-officedocument.wordprocessingml.document');
      return;
    }
  }catch(err){
    hideLoader();
    console.error(err);
    toast(err.message || '내보내기 실패', 'err');
  }
}

function buildStandaloneHtml(){
  const bodyHtml = editor.getHTML();
  const title = $('#doc-title').value || '';
  const page = { w: getComputedStyle(root).getPropertyValue('--page-w').trim(),
                 h: getComputedStyle(root).getPropertyValue('--page-h').trim() };
  const family = getComputedStyle(root).getPropertyValue('--body-family').trim();
  const size = getComputedStyle(root).getPropertyValue('--body-size').trim();
  const lead = getComputedStyle(root).getPropertyValue('--body-leading').trim();
  return `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>${escapeHtml(title)}</title>
<style>
@page{size:${page.w} ${page.h};margin:20mm}
body{font-family:${family};font-size:${size};line-height:${lead};color:#1A1A1A;max-width:${page.w};margin:40px auto;padding:20mm}
h1{font-size:22pt;margin:0 0 12pt}h2{font-size:16pt;margin:18pt 0 8pt}h3{font-size:13pt;margin:14pt 0 6pt}
p{margin:0 0 8pt;text-align:justify;word-break:keep-all}
img{max-width:100%;height:auto}img.float-left{float:left;margin:0 12pt 6pt 0;max-width:50%}
img.float-right{float:right;margin:0 0 6pt 12pt;max-width:50%}img.center{display:block;margin:10pt auto}
blockquote{border-left:3px solid #ccc;padding:0 12pt;color:#666;font-style:italic}
table{border-collapse:collapse;width:100%;margin:10pt 0}td,th{border:1px solid #333;padding:4pt 6pt}
</style></head><body>${bodyHtml}</body></html>`;
}

function tiptapJsonToMarkdown(doc){
  const out = [];
  function walkInline(nodes){
    return (nodes||[]).map(n=>{
      if (n.type === 'text'){
        let t = n.text || '';
        const marks = n.marks || [];
        for (const m of marks){
          if (m.type === 'bold') t = `**${t}**`;
          else if (m.type === 'italic') t = `*${t}*`;
          else if (m.type === 'underline') t = `__${t}__`;
          else if (m.type === 'strike') t = `~~${t}~~`;
          else if (m.type === 'code') t = `\`${t}\``;
        }
        return t;
      }
      if (n.type === 'hardBreak') return '  \n';
      if (n.type === 'image') return `![${n.attrs?.alt||''}](${n.attrs?.src||''})`;
      return '';
    }).join('');
  }
  for (const n of doc.content || []){
    if (n.type === 'heading'){
      out.push('#'.repeat(n.attrs?.level||1) + ' ' + walkInline(n.content) + '\n');
    } else if (n.type === 'paragraph'){
      out.push(walkInline(n.content) + '\n');
    } else if (n.type === 'bulletList' || n.type === 'orderedList'){
      const ordered = n.type === 'orderedList';
      let i = 1;
      (n.content||[]).forEach(li=>{
        const text = (li.content||[]).map(p=>walkInline(p.content||[])).join(' ');
        out.push((ordered ? `${i++}.` : '-') + ' ' + text);
      });
      out.push('');
    } else if (n.type === 'blockquote'){
      const text = (n.content||[]).map(p=>walkInline(p.content||[])).join('\n');
      out.push(text.split('\n').map(l=>'> '+l).join('\n') + '\n');
    } else if (n.type === 'horizontalRule'){
      out.push('---\n');
    } else if (n.type === 'image'){
      out.push(`![${n.attrs?.alt||''}](${n.attrs?.src||''})\n`);
    }
  }
  return out.join('\n');
}

async function tiptapJsonToDocx(doc, docx){
  const { Document, Packer, Paragraph, TextRun, HeadingLevel } = docx;
  const children = [];
  function inlineRuns(nodes){
    return (nodes||[]).map(n=>{
      if (n.type === 'text'){
        const marks = n.marks || [];
        return new TextRun({
          text: n.text || '',
          bold: marks.some(m=>m.type==='bold'),
          italics: marks.some(m=>m.type==='italic'),
          underline: marks.some(m=>m.type==='underline') ? {} : undefined,
          strike: marks.some(m=>m.type==='strike'),
        });
      }
      if (n.type === 'hardBreak') return new TextRun({ text: '', break: 1 });
      return new TextRun('');
    });
  }
  for (const n of doc.content || []){
    if (n.type === 'heading'){
      const lvl = n.attrs?.level || 1;
      const hMap = { 1: HeadingLevel.HEADING_1, 2: HeadingLevel.HEADING_2, 3: HeadingLevel.HEADING_3 };
      children.push(new Paragraph({ heading: hMap[lvl], children: inlineRuns(n.content) }));
    } else if (n.type === 'paragraph'){
      children.push(new Paragraph({ children: inlineRuns(n.content) }));
    } else if (n.type === 'bulletList' || n.type === 'orderedList'){
      (n.content||[]).forEach(li=>{
        (li.content||[]).forEach(p=>{
          children.push(new Paragraph({
            bullet: n.type === 'bulletList' ? { level: 0 } : undefined,
            numbering: n.type === 'orderedList' ? { reference: 'num1', level: 0 } : undefined,
            children: inlineRuns(p.content),
          }));
        });
      });
    } else if (n.type === 'blockquote'){
      (n.content||[]).forEach(p=>{
        children.push(new Paragraph({ children: inlineRuns(p.content), indent: { left: 400 } }));
      });
    }
  }
  const document = new Document({
    sections: [{ properties: {}, children }],
    numbering: {
      config: [{
        reference: 'num1',
        levels: [{ level: 0, format: 'decimal', text: '%1.', alignment: 'left' }]
      }]
    }
  });
  return await Packer.toBlob(document);
}

/* Automatic reflow triggers — catch paste, image load, resize, DOM mutations.
   This is what guarantees the editor's true rendered height drives pagination,
   instead of a stale scrollHeight measured before layout settles. */
function installEditorObservers(){
  const pm = document.querySelector('#editor .ProseMirror');
  if (!pm){ setTimeout(installEditorObservers, 100); return; }

  // Size changes (fonts loaded, images decoded, content added/removed)
  const ro = new ResizeObserver(()=>scheduleReflow());
  ro.observe(pm);

  // Structural mutations (new nodes, attribute changes) — debounced via scheduleReflow's rAF
  const mo = new MutationObserver(()=>scheduleReflow());
  mo.observe(pm, { subtree: true, childList: true, characterData: true });

  // Image load completions (some imgs report scrollHeight wrong until decoded)
  pm.addEventListener('load', e=>{
    if (e.target.tagName === 'IMG'){
      scheduleReflow();
      if (e.target.classList.contains('float-left') || e.target.classList.contains('float-right')){
        applyImageShape(e.target);
      }
    }
  }, true);

  // Paste — run reflow on the NEXT tick, then once more after images may have loaded
  pm.addEventListener('paste', ()=>{
    setTimeout(()=>{ scheduleReflow(); rescanEditorImages(); }, 0);
    setTimeout(()=>{ scheduleReflow(); rescanEditorImages(); }, 200);
    setTimeout(()=>{ scheduleReflow(); }, 800);
  });
}
installEditorObservers();
